name: Publish TinyPM Package

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-tinypm-package.yml"
      - "packaging/tinypm/**"
      - "scripts/build-tinypm-image.sh"
      - "vendor/tinypm/**"
      - "VERSION"

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read versions
        id: vars
        run: |
          set -euo pipefail

          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/abora-tinypm"

          abora_value="$(tr -d '\n' < VERSION | tr -cd '[:alnum:]._-')"
          case "$abora_value" in
            [Vv]*) abora_tag="$abora_value" ;;
            *) abora_tag="v$abora_value" ;;
          esac

          tinypm_version="$(
            awk -F'"' '/^tinypm_version=/{print $2; exit}' vendor/tinypm/lib/core/common.sh
          )"
          tinypm_version="$(printf '%s' "${tinypm_version:-unknown}" | tr -cd '[:alnum:]._-')"

          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "abora_value=$abora_value" >> "$GITHUB_OUTPUT"
          echo "abora_tag=$abora_tag" >> "$GITHUB_OUTPUT"
          echo "tinypm_version=$tinypm_version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ github.event.repository.default_branch }},enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=git-,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=ref,event=tag
            type=raw,value=${{ steps.vars.outputs.tinypm_version }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=v${{ steps.vars.outputs.tinypm_version }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=abora-${{ steps.vars.outputs.abora_tag }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.title=TinyPM V3
            org.opencontainers.image.description=TinyPM V3 CLI container published from the Abora OS repository.
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.abora.version=${{ steps.vars.outputs.abora_value }}
            io.tinypm.version=${{ steps.vars.outputs.tinypm_version }}

      - name: Build and push TinyPM image
        uses: docker/build-push-action@v6
        with:
          context: ./vendor/tinypm
          file: ./packaging/tinypm/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TINYPM_VERSION=${{ steps.vars.outputs.tinypm_version }}
            ABORA_VERSION=${{ steps.vars.outputs.abora_value }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}

      - name: Show published image tags
        run: |
          printf 'Published package: %s\n' "${{ steps.vars.outputs.image }}"
          printf 'Tags:\n%s\n' "${{ steps.meta.outputs.tags }}"
