name: Build Abora ISO

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "nix/**"
      - "scripts/**"
      - "VERSION"
      - "assets/wallpaper.png"
      - "flake.nix"
      - ".github/workflows/build-iso.yml"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "value=$(tr -d '\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install Nix (official installer, no FlakeHub)
        run: |
          set -euxo pipefail
          curl -fsSL https://nixos.org/nix/install -o /tmp/install-nix.sh
          sh /tmp/install-nix.sh --no-daemon
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          "$HOME/.nix-profile/bin/nix" --version

      - name: Build ISO
        id: build_iso
        continue-on-error: true
        env:
          NIX_CONFIG: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
        run: |
          set -euxo pipefail
          export PATH="$HOME/.nix-profile/bin:$PATH"
          nix --version
          ./scripts/build-iso.sh 2>&1 | tee /tmp/abora-build-iso.log

      - name: Show Build Log Tail
        if: always()
        run: |
          echo "=== build log tail ==="
          tail -n 200 /tmp/abora-build-iso.log || true

      - name: Show output files
        if: steps.build_iso.outcome == 'success'
        run: ls -lah out

      - name: Upload Build Log Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: abora-build-log-${{ github.run_number }}
          path: /tmp/abora-build-iso.log
          if-no-files-found: warn

      - name: Upload ISO artifact
        if: steps.build_iso.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: abora-${{ steps.version.outputs.value }}-${{ github.run_number }}
          path: |
            out/*.iso
            out/SHA256SUMS-*.txt
          if-no-files-found: error

      - name: Fail Build If ISO Step Failed
        if: steps.build_iso.outcome != 'success'
        run: |
          echo "ISO build failed; see abora-build-log artifact."
          exit 1
