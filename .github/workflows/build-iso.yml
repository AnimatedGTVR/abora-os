name: Build Abora ISO

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-iso.yml"
      - "assets/**"
      - "docs/**"
      - "nix/**"
      - "scripts/**"
      - "vendor/**"
      - "VERSION"
      - "flake.nix"
      - "flake.lock"
      - "README.md"
      - "RELEASE_NOTES.md"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          set -euo pipefail
          value="$(tr -d '\n' < VERSION | tr -cd '[:alnum:]._-')"
          case "$value" in
            [Vv]*) tag="$value" ;;
            *) tag="v$value" ;;
          esac
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install Nix (official installer, no FlakeHub)
        run: |
          set -euxo pipefail
          curl -fsSL https://nixos.org/nix/install -o /tmp/install-nix.sh
          sh /tmp/install-nix.sh --no-daemon
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          "$HOME/.nix-profile/bin/nix" --version

      - name: Build Release Bundle
        id: build_iso
        continue-on-error: true
        env:
          NIX_CONFIG: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
        run: |
          set -euxo pipefail
          export PATH="$HOME/.nix-profile/bin:$PATH"
          nix --version
          make release 2>&1 | tee /tmp/abora-build-iso.log

      - name: Show Build Log Tail
        if: always()
        run: |
          echo "=== build log tail ==="
          tail -n 200 /tmp/abora-build-iso.log || true

      - name: Show output files
        if: steps.build_iso.outcome == 'success'
        run: ls -lah out

      - name: Upload Build Log Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: abora-build-log-${{ github.run_number }}
          path: /tmp/abora-build-iso.log
          if-no-files-found: warn

      - name: Upload ISO artifact
        if: steps.build_iso.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: abora-${{ steps.version.outputs.tag }}-${{ github.run_number }}
          path: |
            out/*-${{ steps.version.outputs.tag }}.iso
            out/tinypm-*-abora-${{ steps.version.outputs.tag }}.tar.gz
            out/SHA256SUMS-${{ steps.version.outputs.tag }}.txt
            out/RELEASE_MANIFEST-${{ steps.version.outputs.tag }}.txt
            out/RELEASE_NOTES-${{ steps.version.outputs.tag }}.md
          if-no-files-found: error

      - name: Fail Build If ISO Step Failed
        if: steps.build_iso.outcome != 'success'
        run: |
          echo "ISO build failed; see abora-build-log artifact."
          if [ -f /tmp/abora-build-iso.log ]; then
            tail_txt="$(tail -n 40 /tmp/abora-build-iso.log)"
            esc_tail="$(printf '%s' "$tail_txt" | sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e ':a;N;$!ba;s/\n/%0A/g')"
            echo "::error title=ISO build failure tail::$esc_tail"
          else
            echo "::error title=ISO build failure::No /tmp/abora-build-iso.log file found."
          fi
          exit 1
